<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Kiosk viewport: cover the whole screen, no pinch-zoom (always-on panel) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1a1140" />
    <!-- iOS PWA: full-screen standalone kiosk (NFR3, UX-DR16) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maison" />
    <!-- iOS home-screen icon. SVG works on recent iPadOS; a 180×180 PNG is the
         crisp fallback — see docs/kiosk.md to generate one. -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>Home Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
